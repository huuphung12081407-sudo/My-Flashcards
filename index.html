<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Flashcards - True Kaiti</title>
    
    <style>
        @font-face {
            font-family: 'TrueKaiti';
            /* Đây là link font Khải Thư chuẩn, nét chữ vuông vắn, móc nhọn */
            src: url('https://cdn.jsdelivr.net/gh/project-noonnu/noonfonts_seven@1.0/Kaiti-SC-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root { 
            --primary: #e63946; --secondary: #457b9d; --bg: #f8f9fa; 
            --success: #2a9d8f; --dark: #1d3557; --orange: #f4a261;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; padding: 10px; margin: 0; min-height: 100vh;
        }

        /* --- PHẦN ÉP FONT KHẢI THƯ --- */
        .hanzi-char { 
            /* Ưu tiên 1: Font nhúng TrueKaiti. Ưu tiên 2: Font hệ thống Apple/Win */
            font-family: 'TrueKaiti', "Kaiti SC", "STKaiti", "KaiTi", "Microsoft YaHei", serif !important; 
            font-size: 105px; 
            color: var(--primary); 
            cursor: pointer; 
            line-height: 1.2;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .tab-menu { display: flex; width: 100%; max-width: 400px; background: #eee; border-radius: 12px; margin-bottom: 10px; padding: 4px; }
        .tab-menu button { flex: 1; border: none; padding: 10px 2px; border-radius: 8px; cursor: pointer; background: transparent; font-weight: bold; color: #777; font-size: 11px; }
        .tab-menu button.active { background: white; color: var(--dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { width: 100%; max-width: 400px; perspective: 1000px; }
        .flashcard { width: 100%; height: 480px; position: relative; transform-style: preserve-3d; transition: transform 0.4s; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; background: white; box-shadow: 0 8px 15px rgba(0,0,0,0.08); padding: 15px; text-align: center; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); border-top: 5px solid var(--secondary); }
        .hanzi-wrapper { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .hanzi-char.active { color: var(--orange); }
        #stroke-target { width: 180px; height: 180px; border: 1px dashed #ddd; border-radius: 12px; margin-top: 10px; background: #fff; }
        .pinyin { font-size: 26px; color: #666; margin: 10px 0; }
        .meaning { font-size: 22px; font-weight: bold; color: var(--dark); }
        .btn-group { display: flex; gap: 8px; margin-top: 12px; width: 100%; max-width: 400px; }
        button.action { flex: 1; padding: 14px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; box-shadow: 0 3px 0px rgba(0,0,0,0.15); }
        button.action:active { transform: translateY(2px); box-shadow: none; }
        .btn-blue { background: var(--secondary); }
        .btn-red { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--orange); }
    </style>
</head>
<body>
    <div id="status" style="font-size: 10px; color: #bbb;">HSK Kaiti Version 2.0</div>
    <div class="tab-menu">
        <button id="tab-new" class="active" onclick="changeTab('new')">🆕 Mới</button>
        <button id="tab-learning" onclick="changeTab('learning')">⏳ Đang học</button>
        <button id="tab-mastered" onclick="changeTab('mastered')">🏆 Đã thuộc</button>
    </div>
    <div id="stats-text" style="font-size: 13px; color: #999; margin-bottom: 8px; font-weight: bold;">0 / 0</div>
    <div class="container">
        <div id="card" class="flashcard">
            <div class="card-face">
                <div id="hanzi-wrapper" class="hanzi-wrapper"></div>
                <div id="stroke-target"></div>
                <button class="action btn-blue" style="margin-top: 15px; font-size: 13px; padding: 8px;" onclick="flipCard()">Xem nghĩa</button>
            </div>
            <div class="card-face card-back" onclick="flipCard()">
                <p class="pinyin" id="back-pinyin">...</p>
                <p class="meaning" id="back-meaning">...</p>
            </div>
        </div>
    </div>
    <div class="btn-group">
        <button class="action btn-blue" onclick="changeCard(-1)">⬅️</button>
        <button class="action btn-orange" onclick="shuffleWords()">🔀 Trộn</button>
        <button class="action btn-blue" onclick="changeCard(1)">➡️</button>
    </div>
    <div class="btn-group">
        <button class="action btn-blue" style="flex: 0.4;" onclick="speak()">🔊 Đọc</button>
        <button class="action btn-red" onclick="handleMark(false)">❌ Quên</button>
        <button class="action btn-green" onclick="handleMark(true)">✅ Thuộc</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6GBYQFrAk-jixOHQz3MyoWWpyT6cB3fCBTb29iaTX4kl1YMbj5VI6M96FTNi64yEI/exec';
        let originalWords = [], displayList = [], currentIndex = 0, currentTab = 'new', writer = null;
        let db = JSON.parse(localStorage.getItem('hsk_true_kaiti') || "{}");

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                originalWords = await response.json();
                render();
            } catch (e) { console.error("Lỗi tải dữ liệu"); }
        }

        function changeTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            render();
        }

        function render() {
            if (currentTab === 'new') displayList = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0);
            else if (currentTab === 'learning') displayList = originalWords.filter(w => db[w.hanzi] && db[w.hanzi].count >= 1 && db[w.hanzi].count <= 2);
            else if (currentTab === 'mastered') displayList = originalWords.filter(w => db[w.hanzi] && db[w.hanzi].count >= 3);
            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            const wrapper = document.getElementById('hanzi-wrapper');
            wrapper.innerHTML = ""; 
            if (displayList.length === 0) {
                wrapper.innerHTML = "Trống";
                return;
            }
            const w = displayList[currentIndex];
            document.getElementById('stats-text').innerText = `Thẻ ${currentIndex + 1} / ${displayList.length}`;
            w.hanzi.trim().split("").forEach((char, index) => {
                const span = document.createElement("span");
                span.innerText = char;
                span.className = "hanzi-char";
                if(index === 0) span.classList.add('active'); 
                span.onclick = (e) => {
                    e.stopPropagation(); 
                    document.querySelectorAll('.hanzi-char').forEach(c => c.classList.remove('active'));
                    span.classList.add('active');
                    drawChar(char);
                };
                wrapper.appendChild(span);
            });
            document.getElementById('back-pinyin').innerText = w.pinyin;
            document.getElementById('back-meaning').innerText = w.meaning;
            drawChar(w.hanzi.trim()[0]);
        }

        function drawChar(char) {
            document.getElementById('stroke-target').innerHTML = ""; 
            writer = HanziWriter.create('stroke-target', char, { width: 170, height: 170, padding: 5, strokeAnimationSpeed: 1.5, strokeColor: '#e63946' });
            writer.animateCharacter();
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); if(document.getElementById('card').classList.contains('flipped')) speak(); }
        function changeCard(n) { if (displayList.length === 0) return; currentIndex = (currentIndex + n + displayList.length) % displayList.length; updateUI(); }
        function handleMark(isCorrect) {
            const word = displayList[currentIndex].hanzi;
            if (!db[word]) db[word] = { count: 0 };
            if (isCorrect) db[word].count = Math.min(db[word].count + 1, 3);
            else db[word].count = (db[word].count >= 3) ? 1 : 0;
            localStorage.setItem('hsk_true_kaiti', JSON.stringify(db));
            setTimeout(render, 200);
        }
        function speak() { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(displayList[currentIndex].hanzi); msg.lang = 'zh-CN'; window.speechSynthesis.speak(msg); }
        function shuffleWords() {
            displayList.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateUI();
        }
        window.onload = loadData;
    </script>
</body>
</html>
