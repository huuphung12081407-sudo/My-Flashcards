<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Flashcard Từ vựng New</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        :root { --primary: #e63946; --secondary: #457b9d; --bg: #f1faee; --success: #2a9d8f; --dark: #1d3557; --orange: #f4a261; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }
        
        /* Tab Menu */
        .tab-menu { display: flex; width: 100%; max-width: 400px; background: #e0e0e0; border-radius: 15px; margin-bottom: 10px; padding: 5px; }
        .tab-menu button { flex: 1; border: none; padding: 10px 5px; border-radius: 10px; cursor: pointer; background: transparent; font-weight: bold; color: #666; transition: 0.3s; font-size: 12px; }
        .tab-menu button.active { background: white; color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        #stats-text { font-size: 14px; color: #888; margin-bottom: 10px; font-weight: bold; }
        
        /* Card Structure */
        .container { width: 100%; max-width: 400px; perspective: 1000px; }
        .flashcard { width: 100%; height: 500px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 25px; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 20px; text-align: center; box-sizing: border-box; border: 1px solid #eee; }
        .card-back { transform: rotateY(180deg); border-left: 5px solid var(--secondary); }
        
        /* Hanzi Tách Chữ */
        .hanzi-wrapper { display: flex; gap: 6px; justify-content: center; margin-bottom: 15px; }
        .hanzi-char { font-family: "KaiTi", "STKaiti", "楷体", "Ma Shan Zheng", serif; font-size: 75px; color: var(--primary); transition: 0.2s; cursor: pointer; padding: 0 5px; border-radius: 10px; }
        .hanzi-char.active { background: #fff1f1; color: var(--orange); box-shadow: inset 0 0 0 2px #ffcccc; }
        
        /* Khung vẽ chữ */
        #stroke-target { width: 200px; height: 200px; border: 1px dashed #ccc; border-radius: 15px; margin-top: 10px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .pinyin { font-size: 28px; color: #555; margin: 10px 0; font-style: italic; }
        .meaning { font-size: 24px; font-weight: bold; color: var(--dark); }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 400px; }
        button.action { flex: 1; padding: 12px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 0px rgba(0,0,0,0.2); }
        button.action:active { transform: translateY(2px); box-shadow: none; }
        .btn-blue { background: var(--secondary); }
        .btn-red { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--orange); }
        
        /* Nút Reset */
        .btn-reset-data { margin-top: 30px; background: none; border: 1px solid #ccc; color: #999; padding: 8px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .btn-reset-data:hover { background: #eee; color: #666; }
        
        #status { font-size: 12px; color: var(--secondary); margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="status">Đang nạp dữ liệu...</div>
    <div class="tab-menu">
        <button id="tab-new" class="active" onclick="changeTab('new')">🆕 Chưa học</button>
        <button id="tab-learning" onclick="changeTab('learning')">⏳ Đang học</button>
        <button id="tab-mastered" onclick="changeTab('mastered')">🏆 Đã thuộc</button>
    </div>
    <div id="stats-text">Thẻ 0 / 0</div>
    <div class="container">
        <div id="card" class="flashcard">
            <div class="card-face">
                <div id="hanzi-wrapper" class="hanzi-wrapper"></div>
                <div id="stroke-target"></div>
                <button class="action btn-blue" style="margin-top: 15px; height: auto; padding: 10px 25px; font-size: 14px;" onclick="flipCard()">Xem nghĩa</button>
            </div>
            <div class="card-face card-back" onclick="flipCard()">
                <p class="pinyin" id="back-pinyin">...</p>
                <p class="meaning" id="back-meaning">...</p>
                <small style="color:#ccc;">(Chạm để quay lại)</small>
            </div>
        </div>
    </div>
    <div class="btn-group">
        <button class="action btn-blue" onclick="changeCard(-1)">⬅️</button>
        <button class="action btn-orange" onclick="shuffleWords()">🔀 Trộn</button>
        <button class="action btn-blue" onclick="changeCard(1)">➡️</button>
    </div>
    <div class="btn-group">
        <button class="action btn-blue" style="flex: 0.3;" onclick="speak()">🔊</button>
        <button class="action btn-red" onclick="handleMark(false)">❌ Quên</button>
        <button class="action btn-green" onclick="handleMark(true)">✅ Thuộc</button>
    </div>

    <button class="btn-reset-data" onclick="resetAllProgress()">🔄 Đặt lại tiến độ học tập</button>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6GBYQFrAk-jixOHQz3MyoWWpyT6cB3fCBTb29iaTX4kl1YMbj5VI6M96FTNi64yEI/exec';
        let originalWords = [], displayList = [], currentIndex = 0, currentTab = 'new', writer = null;
        let db = JSON.parse(localStorage.getItem('hsk_smart_db') || "{}");

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                originalWords = await response.json();
                render();
                document.getElementById('status').innerText = "Đã sẵn sàng!";
            } catch (e) { document.getElementById('status').innerText = "Lỗi kết nối!"; }
        }

        function changeTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            render();
        }

        function render() {
            if (currentTab === 'new') displayList = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].lv === 0);
            else if (currentTab === 'learning') displayList = originalWords.filter(w => db[w.hanzi] && db[w.hanzi].lv > 0 && db[w.hanzi].lv < 5);
            else displayList = originalWords.filter(w => db[w.hanzi] && db[w.hanzi].lv >= 5);
            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            const wrapper = document.getElementById('hanzi-wrapper');
            const stats = document.getElementById('stats-text');
            wrapper.innerHTML = ""; 

            if (displayList.length === 0) {
                wrapper.innerText = "Trống";
                stats.innerText = "0 / 0";
                document.getElementById('stroke-target').innerHTML = "";
                return;
            }

            const w = displayList[currentIndex];
            stats.innerText = `Thẻ ${currentIndex + 1} / ${displayList.length}`;

            const chars = w.hanzi.trim().split("");
            chars.forEach((char, index) => {
                const span = document.createElement("span");
                span.innerText = char;
                span.className = "hanzi-char";
                if(index === 0) span.classList.add('active'); 
                span.onclick = (e) => {
                    e.stopPropagation(); 
                    document.querySelectorAll('.hanzi-char').forEach(c => c.classList.remove('active'));
                    span.classList.add('active');
                    drawChar(char);
                };
                wrapper.appendChild(span);
            });

            document.getElementById('back-pinyin').innerText = w.pinyin;
            document.getElementById('back-meaning').innerText = w.meaning;
            drawChar(chars[0]);
        }

        function drawChar(char) {
            document.getElementById('stroke-target').innerHTML = ""; 
            writer = HanziWriter.create('stroke-target', char, {
                width: 180, height: 180, padding: 5,
                strokeAnimationSpeed: 1, delayBetweenStrokes: 200, strokeColor: '#e63946'
            });
            writer.animateCharacter();
            document.getElementById('stroke-target').onclick = (e) => {
                e.stopPropagation();
                writer.animateCharacter();
            };
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); if(document.getElementById('card').classList.contains('flipped')) speak(); }
        
        function changeCard(n) { if (displayList.length === 0) return; currentIndex = (currentIndex + n + displayList.length) % displayList.length; updateUI(); }
        
        function handleMark(isCorrect) {
            if (displayList.length === 0) return;
            const word = displayList[currentIndex].hanzi;
            if (!db[word]) db[word] = { lv: 0 };
            db[word].lv = isCorrect ? 5 : 1;
            localStorage.setItem('hsk_smart_db', JSON.stringify(db));
            setTimeout(render, 300);
        }

        function speak() { if (displayList.length === 0) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(displayList[currentIndex].hanzi); msg.lang = 'zh-CN'; window.speechSynthesis.speak(msg); }
        
        function shuffleWords() {
            if (displayList.length <= 1) return;
            for (let i = displayList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [displayList[i], displayList[j]] = [displayList[j], displayList[i]];
            }
            currentIndex = 0;
            updateUI();
        }

        function resetAllProgress() {
            if (confirm("Bạn có chắc chắn muốn đặt lại toàn bộ tiến độ học tập? Tất cả từ sẽ quay về mục 'Chưa học'.")) {
                localStorage.removeItem('hsk_smart_db');
                db = {};
                render();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
