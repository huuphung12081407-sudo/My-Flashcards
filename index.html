<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Từ vựng New</title>
    
    <style>
    :root { 
        --kaiti-font: "KaiTi", "STKaiti", "DFKai-SB", "楷体", "楷体_GB2312", serif;
        --primary: #e63946; --secondary: #457b9d; --bg: #f8f9fa; --success: #2a9d8f; 
        --dark: #000000; --orange: #f4a261; --gray: #6c757d; 
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
        overscroll-behavior-y: none !important; 
        /* Xử lý triệt để việc tràn màn hình */
        width: 100%; 
        height: 100dvh; 
        margin: 0; 
        padding: 0; 
        background: #333;
        overflow: hidden;
    }

    body { 
        font-family: -apple-system, system-ui, sans-serif; 
        display: flex; 
        justify-content: center; 
        align-items: center; /* Căn giữa app */
        user-select: none;
    }

    .app-container {
        width: 100%; 
        max-width: 450px; 
        /* Sử dụng dvh để không bị đè bởi thanh địa chỉ trình duyệt */
        height: 100dvh; 
        background: var(--bg);
        /* Padding an toàn cho iPhone (tai thỏ và vạch dưới) */
        padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        display: flex; 
        flex-direction: column; 
        box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        position: relative;
        overflow: hidden;
    }

    /* Đảm bảo phần nội dung chính co giãn linh hoạt */
    #standard-area { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        min-height: 0; /* Quan trọng để flex child không bị tràn */
        overflow: hidden; 
    }

        #hanzii-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 99999; flex-direction: column;
        }
        #hanzii-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f1f1f1; border-bottom: 1px solid #ddd; }
        #hanzii-frame-container { flex: 1; overflow: hidden; }
        #hanzii-iframe { width: 100%; height: 100%; border: none; }

        #standard-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #game-area { flex: 1; display: none; background: #0b0b0b; border-radius: 20px; overflow: hidden; position: relative; border: 4px solid #333; margin-bottom: 10px; }
        
        .tab-menu { display: flex; width: 100%; background: #e9ecef; border-radius: 12px; padding: 4px; margin: 8px 0; flex-shrink: 0; }
        .tab-menu button { flex: 1; border: none; padding: 10px 2px; border-radius: 8px; cursor: pointer; background: transparent; font-weight: 600; color: var(--gray); font-size: 11px; }
        .tab-menu button.active { background: white; color: var(--dark); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .stats-container { width: 100%; background: white; padding: 10px; border-radius: 18px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); position: relative; flex-shrink: 0; }
        .btn-reset { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 14px; cursor: pointer; opacity: 0.3; }
        .progress-wrapper { height: 6px; background: #eee; border-radius: 4px; margin: 8px 0; overflow: hidden; display: flex; }
        .progress-bar { height: 100%; transition: width 0.6s ease; }
        .pb-mastered { background: var(--success); }
        .pb-learning { background: var(--orange); }
        .pb-new { background: #dee2e6; }
        
        .container { width: 100%; flex: 1; perspective: 1000px; margin-bottom: 10px; min-height: 0; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; border-radius: 25px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 15px; border: 1px solid rgba(0,0,0,0.03); overflow-y: auto; }
        .card-back { transform: rotateY(180deg); border-top: 6px solid var(--secondary); justify-content: flex-start; z-index: 2; padding-top: 20px; }

        #hanzi-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 5px; min-height: 70px; text-align: center; }
        .hanzi-char { font-family: var(--kaiti-font); font-size: 60px; cursor: pointer; color: #000; padding: 0 2px; }
        .hanzi-char.active { border-bottom: 4px solid var(--primary); color: var(--primary); }

        .grid-container { width: 160px; height: 160px; margin: 5px auto; position: relative; background: #fff; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .grid-line-v, .grid-line-h { position: absolute; background: #f0f0f0; z-index: 1; }
        .grid-line-v { left: 50%; top: 0; width: 1px; height: 100%; }
        .grid-line-h { top: 50%; left: 0; width: 100%; height: 1px; }
        #stroke-target { position: relative; z-index: 2; width: 100%; height: 100%; }

        .quiz-container { width: 100%; margin-top: 5px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .quiz-btn { padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: white; font-size: 13px; font-weight: bold; cursor: pointer; }
        .quiz-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--secondary); text-align: center; font-size: 18px; outline: none; }

        .tts-settings { width: 100%; background: #f8f9fa; padding: 8px; border-radius: 12px; margin-top: 5px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
        .tts-settings select { width: 100%; font-size: 11px; padding: 4px; border-radius: 5px; }
        .tts-label { font-size: 10px; font-weight: bold; color: var(--gray); display: flex; justify-content: space-between; }

        .btn-group { display: flex; gap: 8px; margin-top: 5px; width: 100%; flex-shrink: 0; }
        button.action { flex: 1; padding: 12px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }

        #game-current-hanzi { position: absolute; top: 90px; width: 100%; text-align: center; color: var(--primary); font-size: 80px; font-family: var(--kaiti-font); z-index: 5; pointer-events: none; }
        #target-container { width: 100%; height: 100%; position: relative; }
        
        .speed-control { 
            position: absolute; top: 45px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 20; 
            background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; align-items: center;
        }
        .speed-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .speed-btn.active { background: white; color: black; border-color: white; }
        
        #blind-mode-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        #blind-mode-btn.active { background: #ff4757; color: white; border-color: #ff4757; }

        #game-start-btn { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); padding: 12px 40px; background: var(--success); color: white; border: none; border-radius: 12px; font-weight: bold; z-index: 20; }
        .btn-lookup { 
            margin-top: 10px; padding:10px; background:#00b4d8; color:white; border:none; 
            border-radius:12px; font-weight:bold; font-size:12px; cursor:pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="hanzii-modal">
            <div id="hanzii-header">
                <span style="font-weight:bold; color:#00b4d8; font-size: 14px;">Hanzii Dictionary</span>
                <button onclick="closeHanzii()" style="background:var(--primary); color:white; border:none; padding:6px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">ĐÓNG</button>
            </div>
            <div id="hanzii-frame-container">
                <iframe id="hanzii-iframe" src="about:blank"></iframe>
            </div>
        </div>

        <div id="status" style="font-size: 9px; color: #adb5bd; margin-bottom: 3px;">Syncing...</div>
        
        <div class="tab-menu">
            <button id="tab-new" class="active" onclick="changeTab('new')">MỚI</button>
            <button id="tab-learning" onclick="changeTab('learning')">ĐANG HỌC</button>
            <button id="tab-mastered" onclick="changeTab('mastered')">ĐÃ THUỘC</button>
            <button id="tab-review" onclick="changeTab('review')" style="background: #fee; color: var(--primary);">🚀 BLAST</button>
        </div>

        <div class="stats-container" id="stats-box">
            <button class="btn-reset" onclick="resetProgress()">🔄</button>
            <div style="display: flex; justify-content: space-around; font-size: 13px;">
                <div style="text-align:center"><span id="stat-new-count" style="font-weight:bold">0</span><br><small>Mới</small></div>
                <div style="text-align:center; color:var(--orange)"><span id="stat-learning-count" style="font-weight:bold">0</span><br><small>Học</small></div>
                <div style="text-align:center; color:var(--success)"><span id="stat-mastered-count" style="font-weight:bold">0</span><br><small>Thuộc</small></div>
            </div>
            <div class="progress-wrapper">
                <div id="pb-mastered" class="progress-bar pb-mastered"></div>
                <div id="pb-learning" class="progress-bar pb-learning"></div>
                <div id="pb-new" class="progress-bar pb-new"></div>
            </div>
        </div>

        <div id="standard-area">
            <div class="container">
                <div id="card" class="flashcard">
                    <div class="card-face">
                        <div id="mastery-count" style="font-size: 12px; margin-bottom: 2px;"></div>
                        <div id="hanzi-wrapper"></div>
                        
                        <div id="interactive-content" style="width: 100%; flex:1; display:flex; flex-direction:column; justify-content:center;">
                            <div id="grid-box" class="grid-container">
                                <div class="grid-line-v"></div><div class="grid-line-h"></div>
                                <div id="stroke-target"></div>
                            </div>
                            <div id="quiz-box"></div>
                        </div>

                        <div id="quiz-msg" style="height:35px; font-size:12px; font-weight:bold; text-align:center; margin: 5px 0; flex-shrink:0;"></div>
                        <button class="action" style="background:var(--secondary); width: auto; padding: 8px 25px; border-radius: 12px; flex-shrink:0;" onclick="flipCard()">ĐÁP ÁN</button>
                    </div>
                    
                    <div class="card-face card-back" onclick="flipCard()">
                        <div id="back-hanzi" style="font-size:60px; color:var(--primary); font-family:var(--kaiti-font)"></div>
                        <p id="back-pinyin" style="font-size:20px; color:var(--secondary); margin:5px 0"></p>
                        <p id="back-meaning" style="font-size:18px; font-weight:bold; text-align: center;"></p>
                        
                        <div id="example-box" style="width:100%; border-top:1px solid #ddd; margin-top:10px; padding-top:10px; display:none; position:relative;" onclick="event.stopPropagation()">
                            <p id="back-example" style="font-size:13px; color:#555; font-style:italic; margin:0; padding-right:35px;"></p>
                            <button onclick="speakExample(event)" style="position:absolute; right:0; top:10px; border:none; background:var(--secondary); color:white; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:12px;">🔊</button>
                        </div>

                        <button class="btn-lookup" onclick="openHanzii(event)">Tra cứu từ điển 🔍</button>

                        <div class="tts-settings" onclick="event.stopPropagation()">
                            <div class="tts-label"><span>GIỌNG ĐỌC:</span></div>
                            <select id="voice-select"></select>
                            <div class="tts-label"><span>TỐC ĐỘ:</span> <span id="speed-val">1.0</span></div>
                            <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeedVal(this.value)" style="width:100%">
                        </div>

                        <button class="action" style="background:var(--gray); flex:none; padding:8px 25px; margin-top:10px; border-radius: 12px;" onclick="event.stopPropagation(); flipCard()">Quay lại</button>
                    </div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="action" style="background:var(--secondary)" onclick="changeCard(-1)">⬅️</button>
                <button class="action" style="background:var(--orange)" onclick="shuffleWords()">🔀</button>
                <button class="action" style="background:var(--secondary)" onclick="changeCard(1)">➡️</button>
            </div>
            
            <div id="main-controls" class="btn-group" style="margin-bottom: 10px;">
                <button class="action" style="background:var(--secondary); flex:0.3" onclick="speak()">🔊</button>
                <button id="mic-btn" class="action" style="background:#606c38; flex:0.3" onclick="startSpeechRecognition()">🎤</button>
                <button class="action" style="background:var(--primary)" onclick="handleMark(false)">QUÊN</button>
                <button class="action" style="background:var(--success)" onclick="handleMark(true)">THUỘC</button>
            </div>
        </div>

        <div id="game-area">
            <div id="game-ui" style="position: absolute; top: 15px; width:100%; padding:0 20px; display:flex; justify-content:space-between; color:white; font-size:13px; z-index:10;">
                <div id="game-score">Điểm: 0</div>
                <div id="game-hearts">❤️❤️❤️</div>
            </div>
            <div class="speed-control">
                <button id="blind-mode-btn" onclick="toggleBlindMode()" title="Chế độ ẩn">👁️</button>
                <div style="width:1px; height:15px; background:rgba(255,255,255,0.2); margin:0 5px;"></div>
                <button class="speed-btn" id="s1" onclick="setSpeed(1)">x1</button>
                <button class="speed-btn" id="s2" onclick="setSpeed(2)">x2</button>
                <button class="speed-btn active" id="s3" onclick="setSpeed(3)">x3</button>
            </div>
            <div id="game-current-hanzi">?</div>
            <div id="target-container"></div>
            <button id="game-start-btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0eAYG6Skvnm5d_qnBe7dYpDJ3oq-rb5zjgfcM-mNrIMDCoGPIl4l66y4re8AJS56I/exec';
        
        let originalWords = JSON.parse(localStorage.getItem('hsk_cached_words') || "[]");
        let currentSheetName = localStorage.getItem('hsk_current_sheet_name') || "Default";
        let allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
        
        let displayList = [], currentIndex = 0, currentTab = 'new';
        let gameScore = 0, gameHearts = 3, gameActive = false, currentCorrectWord = null;
        let targets = [], spawnTimer = null, moveInterval = null, speedMultiplier = 1.9;
        let writerInstance = null, voices = [], isBlindMode = false;

        async function init() {
            updateOnlineStatus();
            initVoices();
            if (originalWords.length > 0) render();

            try {
                const res = await fetch(SCRIPT_URL);
                const result = await res.json();
                if (result && result.words) {
                    originalWords = result.words; 
                    currentSheetName = result.sheetName || "Default";
                    localStorage.setItem('hsk_cached_words', JSON.stringify(originalWords));
                    localStorage.setItem('hsk_current_sheet_name', currentSheetName);
                    updateOnlineStatus(); 
                    render();
                }
            } catch (e) { console.log("Offline mode."); render(); }
        }

        function normalizePinyin(str) {
            if (!str) return "";
            let s = str.toLowerCase().replace(/v/g, 'ü').replace(/\s+/g, '');
            let tone = s.match(/[1-4]/);
            let charOnly = s.replace(/[1-4]/g, '');
            const map = { 'ā': 'a', 'á': 'a', 'ǎ': 'a', 'à': 'a', 'ē': 'e', 'é': 'e', 'ě': 'e', 'è': 'e', 'ī': 'i', 'í': 'i', 'ǐ': 'i', 'ì': 'i', 'ō': 'o', 'ó': 'o', 'ǒ': 'o', 'ò': 'o', 'ū': 'u', 'ú': 'u', 'ǔ': 'u', 'ù': 'u', 'ü': 'u', 'ǘ': 'u', 'ǚ': 'u', 'ǜ': 'u', 'ǖ': 'u' };
            let deAccented = "";
            for (let char of charOnly) deAccented += map[char] || char;
            return { raw: deAccented, tone: tone ? tone[0] : null };
        }

        function checkPinyinMatch(input, target) {
            const iN = normalizePinyin(input); const tN = normalizePinyin(target);
            if (!iN.tone) return iN.raw === tN.raw;
            return iN.raw === tN.raw && iN.tone === tN.tone;
        }

        function initVoices() {
            const select = document.getElementById('voice-select');
            const loadVoices = () => {
                voices = window.speechSynthesis.getVoices();
                const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('CN'));
                select.innerHTML = '';
                zhVoices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name; opt.innerText = v.name.replace('Microsoft', '').trim();
                    if (v.name.includes('Xiaoxiao')) opt.selected = true;
                    select.appendChild(opt);
                });
            };
            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        function updateSpeedVal(v) { document.getElementById('speed-val').innerText = parseFloat(v).toFixed(1); }

        function updateOnlineStatus() {
            const s = document.getElementById('status');
            s.innerText = (navigator.onLine ? "Đang trực tuyến: " : "Ngoại tuyến: ") + currentSheetName;
            s.style.color = navigator.onLine ? "#2a9d8f" : "#adb5bd";
        }

        function changeTab(t) {
            currentTab = t; stopGame();
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            if (t === 'review') {
                document.getElementById('standard-area').style.display = 'none';
                document.getElementById('stats-box').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
            } else {
                document.getElementById('standard-area').style.display = 'flex';
                document.getElementById('stats-box').style.display = 'block';
                document.getElementById('game-area').style.display = 'none';
                render();
            }
        }

        function render() {
            allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
            const db = allProgress[currentSheetName] || {};
            if (currentTab === 'new') displayList = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0);
            else if (currentTab === 'learning') displayList = originalWords.filter(w => db[w.hanzi]?.count >= 1 && db[w.hanzi]?.count <= 3);
            else if (currentTab === 'mastered') displayList = originalWords.filter(w => db[w.hanzi]?.count >= 4);
            currentIndex = 0; updateStats(); updateUI();
        }

        function updateStats() {
            const db = allProgress[currentSheetName] || {};
            const n = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0).length;
            const l = originalWords.filter(w => db[w.hanzi]?.count >= 1 && db[w.hanzi]?.count <= 3).length;
            const m = originalWords.filter(w => db[w.hanzi]?.count >= 4).length;
            document.getElementById('stat-new-count').innerText = n;
            document.getElementById('stat-learning-count').innerText = l;
            document.getElementById('stat-mastered-count').innerText = m;
            const total = originalWords.length || 1;
            document.getElementById('pb-new').style.width = (n/total*100) + "%";
            document.getElementById('pb-learning').style.width = (l/total*100) + "%";
            document.getElementById('pb-mastered').style.width = (m/total*100) + "%";
        }

        function updateUI() {
            const w = displayList[currentIndex];
            const wrap = document.getElementById('hanzi-wrapper');
            const grid = document.getElementById('grid-box');
            const quizBox = document.getElementById('quiz-box');
            const msg = document.getElementById('quiz-msg');
            msg.innerText = ""; wrap.innerHTML = ""; quizBox.innerHTML = "";
            document.getElementById('card').classList.remove('flipped');
            grid.style.display = "block";
            if (!w) { wrap.innerHTML = "Trống"; grid.style.display = "none"; return; }
            const db = allProgress[currentSheetName] || {};
            const count = db[w.hanzi]?.count || 0;
            document.getElementById('mastery-count').innerText = count > 0 ? "⭐".repeat(count) : "🆕";
            if (currentTab === 'learning') {
                grid.style.display = "none";
                if (count === 1) { 
                    wrap.innerHTML = `<div style="font-size:45px; font-family:var(--kaiti-font);">${w.hanzi}</div>`;
                    createMultipleChoice(w);
                } else if (count === 2) {
                    wrap.innerHTML = `<div style="font-size:45px; font-family:var(--kaiti-font);">${w.hanzi}</div>`;
                    createInputQuiz(w, 'pinyin');
                } else if (count === 3) {
                    wrap.innerHTML = `<div style="font-size:22px; color:var(--secondary); font-weight:bold;">${w.meaning}</div>`;
                    createInputQuiz(w, 'hanzi');
                }
            } else if (currentTab === 'mastered') {
                wrap.innerHTML = `<div style="text-align:center"><small>Viết lại chữ:</small><br><b>${w.meaning}</b></div>`;
                startQuizMode(w.hanzi, 0);
            } else {
                w.hanzi.split("").forEach((c, i) => {
                    const s = document.createElement("span"); s.innerText = c;
                    s.className = "hanzi-char " + (i === 0 ? "active" : "");
                    s.onclick = () => { document.querySelectorAll('.hanzi-char').forEach(e => e.classList.remove('active')); s.classList.add('active'); drawChar(c); };
                    wrap.appendChild(s);
                });
                drawChar(w.hanzi[0]);
            }
            document.getElementById('back-hanzi').innerText = w.hanzi;
            document.getElementById('back-pinyin').innerText = w.pinyin;
            document.getElementById('back-meaning').innerText = w.meaning;
            const exBox = document.getElementById('example-box');
            const exTxt = document.getElementById('back-example');
            if (w.example) { exBox.style.display = "block"; exTxt.innerText = w.example; } else { exBox.style.display = "none"; }
        }

        function createMultipleChoice(cW) {
            const box = document.getElementById('quiz-box');
            let choices = originalWords.filter(w => w.hanzi !== cW.hanzi).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.meaning);
            choices.push(cW.meaning); choices.sort(() => 0.5 - Math.random());
            const container = document.createElement('div'); container.className = 'quiz-options';
            choices.forEach(choice => {
                const btn = document.createElement('button'); btn.className = 'quiz-btn'; btn.innerText = choice;
                btn.onclick = () => { if (choice === cW.meaning) handleMark(true); else { btn.style.background = "#fee"; handleMark(false); } };
                container.appendChild(btn);
            });
            box.appendChild(container);
        }

        function createInputQuiz(word, type) {
            const box = document.getElementById('quiz-box');
            const container = document.createElement('div'); container.className = 'quiz-container';
            const input = document.createElement('input'); input.className = 'quiz-input';
            input.placeholder = type === 'pinyin' ? "Pinyin (VD: xia4ng, nv3)..." : "Nhập chữ Hán...";
            const btn = document.createElement('button'); btn.className = 'action'; btn.style.background = 'var(--secondary)'; btn.innerText = "KIỂM TRA";
            const check = () => {
                let val = input.value.trim();
                let isCorrect = (type === 'pinyin') ? checkPinyinMatch(val, word.pinyin) : (val === word.hanzi);
                if (isCorrect) handleMark(true);
                else { document.getElementById('quiz-msg').innerText = `❌ Sai rồi! Thử lại nhé.`; input.style.borderColor = "var(--primary)"; handleMark(false); }
            };
            btn.onclick = check; input.onkeypress = (e) => { if(e.key === 'Enter') check(); };
            container.appendChild(input); container.appendChild(btn); box.appendChild(container); input.focus();
        }

        function drawChar(c) {
            document.getElementById('stroke-target').innerHTML = "";
            writerInstance = HanziWriter.create('stroke-target', c, { width: 160, height: 160, padding: 10, strokeColor: '#e63946', showOutline: true, showCharacter: false });
            writerInstance.animateCharacter();
        }

        function startQuizMode(fH, cI) {
            const cTD = fH[cI]; document.getElementById('stroke-target').innerHTML = "";
            writerInstance = HanziWriter.create('stroke-target', cTD, { width: 160, height: 160, padding: 10, showOutline: false, showCharacter: false, strokeColor: '#e63946', drawingColor: '#2a9d8f' });
            writerInstance.quiz({ onComplete: () => { if (cI < fH.length - 1) setTimeout(() => startQuizMode(fH, cI + 1), 500); else { document.getElementById('quiz-msg').innerText = "✅ Rất tốt!"; speak(); } } });
        }

        function handleMark(ok) {
            const w = displayList[currentIndex]; if(!w) return;
            const db = allProgress[currentSheetName] || {};
            if (!db[w.hanzi]) db[w.hanzi] = { count: 0 };
            db[w.hanzi].count = ok ? Math.min(db[w.hanzi].count + 1, 5) : Math.max(db[w.hanzi].count - 1, 0);
            allProgress[currentSheetName] = db;
            localStorage.setItem('hsk_multi_sheet_db', JSON.stringify(allProgress));
            if(ok) document.getElementById('quiz-msg').innerHTML = "<span style='color:var(--success)'>✅ Chính xác!</span>";
            setTimeout(() => render(), 800);
        }

        /* --- GAME BLAST LOGIC --- */
        function setSpeed(v) { speedMultiplier = v === 1 ? 0.6 : v === 2 ? 1.1 : 1.9; document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active')); document.getElementById('s' + v).classList.add('active'); }
        
        function toggleBlindMode() { 
            isBlindMode = !isBlindMode; 
            document.getElementById('blind-mode-btn').classList.toggle('active'); 
            document.getElementById('blind-mode-btn').innerText = isBlindMode ? "🙈" : "👁️"; 
            updateGameDisplay();
        }
        
        function updateGameDisplay() {
            if (!gameActive) return;
            document.getElementById('game-current-hanzi').innerText = isBlindMode ? "???" : (currentCorrectWord ? currentCorrectWord.hanzi : "?");
        }

        function startGame() {
            const gP = originalWords.filter(w => (allProgress[currentSheetName]?.[w.hanzi]?.count || 0) > 0);
            if (gP.length < 2) return alert("Cần ít nhất 2 từ đã học!");
            document.getElementById('game-start-btn').style.display = 'none';
            gameScore = 0; gameHearts = 3; gameActive = true; updateGameUI(); spawnNewWord(gP);
            moveInterval = setInterval(updateTargets, 20); spawnTimer = setInterval(() => spawnTarget(gP), 2400); 
        }
        function spawnNewWord(p) {
            targets.forEach(t => t.isLegacy = true);
            currentCorrectWord = p[Math.floor(Math.random() * p.length)];
            updateGameDisplay();
            speakGame(currentCorrectWord.hanzi); spawnTarget(p, currentCorrectWord.meaning, true);
        }
        function spawnTarget(p, txt = null, iC = false) {
            if (!gameActive) return;
            const node = document.createElement('div');
            let word = iC ? currentCorrectWord : p[Math.floor(Math.random() * p.length)];
            node.innerText = txt || word.meaning;
            node.style.cssText = `position:absolute; padding:10px 18px; background:white; border-radius:25px; font-weight:bold; font-size:13px; top:550px; left:${Math.random()*220}px; box-shadow:0 4px 10px rgba(0,0,0,0.2); cursor:pointer; z-index:100;`;
            node.onclick = () => {
                if (word.hanzi === currentCorrectWord.hanzi) { gameScore += 10; node.remove(); spawnNewWord(p); updateGameUI(); }
                else { gameHearts--; updateGameUI(); if(gameHearts <= 0) { stopGame(); alert("Game Over!"); } node.style.background="red"; }
            };
            document.getElementById('target-container').appendChild(node);
            targets.push({ el: node, y: 550, speed: (1.5 + (gameScore/500)) * speedMultiplier, hanzi: word.hanzi, isLegacy: false });
        }
        function updateTargets() {
            targets.forEach((t, i) => {
                t.y -= t.speed; t.el.style.top = t.y + 'px';
                if (t.y < -50) { if (t.hanzi === currentCorrectWord.hanzi && (!t.isLegacy || t.y > 180)) { gameHearts--; updateGameUI(); if(gameHearts <= 0) stopGame(); } t.el.remove(); targets.splice(i, 1); }
            });
        }
        function stopGame() { gameActive = false; clearInterval(moveInterval); clearInterval(spawnTimer); document.getElementById('game-start-btn').style.display = 'block'; document.getElementById('target-container').innerHTML = ''; targets = []; document.getElementById('game-current-hanzi').innerText = "?"; }
        function updateGameUI() { document.getElementById('game-score').innerText = `Điểm: ${gameScore}`; document.getElementById('game-hearts').innerText = "❤️".repeat(gameHearts) + "🖤".repeat(3 - gameHearts); }

        function getTTSParams() {
            const vN = document.getElementById('voice-select').value;
            const rate = parseFloat(document.getElementById('speed-range').value);
            const voice = voices.find(v => v.name === vN);
            return { voice, rate };
        }
        function speak() {
            window.speechSynthesis.cancel(); const { voice, rate } = getTTSParams();
            const msg = new SpeechSynthesisUtterance(displayList[currentIndex].hanzi);
            msg.voice = voice; msg.rate = rate; msg.lang = 'zh-CN'; window.speechSynthesis.speak(msg);
        }
        function speakExample(e) {
            if(e) e.stopPropagation(); window.speechSynthesis.cancel(); const { voice, rate } = getTTSParams();
            const raw = displayList[currentIndex].example;
            const chineseOnly = raw.match(/[\u4e00-\u9fa5\u3000-\u303f\uff00-\uffef]/g);
            if (chineseOnly) {
                const msg = new SpeechSynthesisUtterance(chineseOnly.join(""));
                msg.voice = voice; msg.rate = rate; msg.lang = 'zh-CN'; window.speechSynthesis.speak(msg);
            }
        }
        function speakGame(h) {
            window.speechSynthesis.cancel(); const { voice, rate } = getTTSParams();
            const msg = new SpeechSynthesisUtterance(h);
            msg.voice = voice; msg.rate = rate; msg.lang = 'zh-CN'; window.speechSynthesis.speak(msg);
        }
        function openHanzii(e) { if(e) e.stopPropagation(); const word = displayList[currentIndex].hanzi; if (word) { document.getElementById('hanzii-iframe').src = "https://hanzii.net/search/word/" + encodeURIComponent(word) + "?hl=vi-VN"; document.getElementById('hanzii-modal').style.display = "flex"; } }
        function closeHanzii() { document.getElementById('hanzii-modal').style.display = "none"; document.getElementById('hanzii-iframe').src = "about:blank"; }
        function flipCard() { document.getElementById('card').classList.toggle('flipped'); if(document.getElementById('card').classList.contains('flipped')) speak(); }
        function changeCard(n) { currentIndex = (currentIndex + n + displayList.length) % displayList.length; updateUI(); }
        function shuffleWords() { displayList.sort(() => Math.random() - 0.5); currentIndex = 0; updateUI(); }
        function resetProgress() { if(confirm("Xóa tiến độ?")) { delete allProgress[currentSheetName]; localStorage.setItem('hsk_multi_sheet_db', JSON.stringify(allProgress)); render(); } }
        
        function startSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) return alert("Không hỗ trợ.");
            const rec = new webkitSpeechRecognition(); rec.lang = 'zh-CN';
            const btn = document.getElementById('mic-btn');
            rec.onstart = () => { btn.classList.add('listening'); document.getElementById('quiz-msg').innerText = "Đang nghe..."; };
            rec.onresult = (e) => {
                const result = e.results[0][0].transcript;
                if (result === displayList[currentIndex].hanzi) document.getElementById('quiz-msg').innerHTML = `<span style="color:var(--success)">✅ Khớp: ${result}</span>`;
                else document.getElementById('quiz-msg').innerHTML = `<span style="color:var(--primary)">❌ Nghe thành: "${result}"</span>`;
            };
            rec.onend = () => btn.classList.remove('listening');
            rec.start();
        }

        window.onload = init;
    </script>
</body>
</html>
