<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Từ Vựng New</title>
    
    <style>
        :root { 
            --kaiti-font: "KaiTi", "STKaiti", "DFKai-SB", "楷体", "楷体_GB2312", serif;
            --primary: #e63946; --secondary: #457b9d; --bg: #f8f9fa; --success: #2a9d8f; 
            --dark: #000000; --orange: #f4a261; --gray: #6c757d; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            overscroll-behavior-y: none !important; 
            position: fixed; width: 100%; height: 100%; overflow: hidden;
            margin: 0; padding: 0; background: #333;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; flex-direction: column; align-items: center; user-select: none;
        }

        .app-container {
            width: 100%; max-width: 400px; height: 100vh; background: var(--bg);
            padding: env(safe-area-inset-top) 15px 15px 15px;
            display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative;
        }

        /* MODAL TRA CỨU */
        #hanzii-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 99999; flex-direction: column;
        }
        #hanzii-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f1f1f1; border-bottom: 1px solid #ddd; }
        #hanzii-frame-container { flex: 1; overflow: hidden; }
        #hanzii-iframe { width: 100%; height: 100%; border: none; }

        #standard-area, #game-area { width: 100%; display: flex; flex-direction: column; }
        
        .tab-menu { display: flex; width: 100%; background: #e9ecef; border-radius: 12px; padding: 4px; margin: 8px 0; }
        .tab-menu button { flex: 1; border: none; padding: 10px 2px; border-radius: 8px; cursor: pointer; background: transparent; font-weight: 600; color: var(--gray); font-size: 11px; }
        .tab-menu button.active { background: white; color: var(--dark); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .stats-container { width: 100%; background: white; padding: 12px; border-radius: 18px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); position: relative; }
        .btn-reset { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 14px; cursor: pointer; opacity: 0.3; }
        .progress-wrapper { height: 7px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; display: flex; }
        .progress-bar { height: 100%; transition: width 0.6s ease; }
        .pb-mastered { background: var(--success); }
        .pb-learning { background: var(--orange); }
        .pb-new { background: #dee2e6; }
        
        .container { width: 100%; height: 400px; perspective: 1000px; margin-bottom: 10px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; border-radius: 25px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 15px; border: 1px solid rgba(0,0,0,0.03); }
        .card-back { transform: rotateY(180deg); border-top: 6px solid var(--secondary); justify-content: center; z-index: 2; }

        #hanzi-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 5px; min-height: 85px; }
        .hanzi-char { font-family: var(--kaiti-font); font-size: 65px; cursor: pointer; color: #000; padding: 0 2px; }
        .hanzi-char.active { border-bottom: 4px solid var(--primary); color: var(--primary); }

        .grid-container { width: 190px; height: 190px; margin: 5px auto; position: relative; background: #fff; border: 2px solid #ddd; border-radius: 12px; overflow: hidden; }
        .grid-line-v, .grid-line-h { position: absolute; background: #f0f0f0; z-index: 1; }
        .grid-line-v { left: 50%; top: 0; width: 1px; height: 100%; }
        .grid-line-h { top: 50%; left: 0; width: 100%; height: 1px; }
        #stroke-target { position: relative; z-index: 2; width: 100%; height: 100%; }

        .btn-group { display: flex; gap: 8px; margin-top: 5px; width: 100%; }
        button.action { flex: 1; padding: 12px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }

        #game-area { height: 550px; display: none; background: #0b0b0b; border-radius: 30px; overflow: hidden; position: relative; border: 4px solid #333; }
        #game-current-hanzi { position: absolute; top: 90px; width: 100%; text-align: center; color: var(--primary); font-size: 80px; font-family: var(--kaiti-font); z-index: 5; pointer-events: none; }
        #target-container { width: 100%; height: 100%; position: relative; }
        
        .speed-control { 
            position: absolute; top: 45px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 20; 
            background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; align-items: center;
        }
        .speed-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .speed-btn.active { background: white; color: black; border-color: white; }
        
        #blind-mode-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        #blind-mode-btn.active { background: #ff4757; color: white; border-color: #ff4757; }

        #game-start-btn { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); padding: 12px 40px; background: var(--success); color: white; border: none; border-radius: 12px; font-weight: bold; z-index: 20; }
        .listening { animation: pulse 0.8s infinite; border: 2px solid white !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); } }
        
        /* FIX CẢM ỨNG NÚT TRA CỨU */
        .btn-lookup { 
            margin-top: 15px; padding:12px 20px; background:#00b4d8; color:white; border:none; 
            border-radius:12px; font-weight:bold; font-size:13px; cursor:pointer; 
            z-index: 10; position: relative;
        }
	/* Phần hiển thị ví dụ ở mặt sau */
        .example {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #555;
            font-style: italic;
            border-top: 1px solid #ccc;
            padding-top: 5px;
            width: 100%;
            word-wrap: break-word;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="hanzii-modal">
            <div id="hanzii-header">
                <span style="font-weight:bold; color:#00b4d8; font-size: 14px;">Hanzii Dictionary</span>
                <button onclick="closeHanzii()" style="background:var(--primary); color:white; border:none; padding:6px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">ĐÓNG</button>
            </div>
            <div id="hanzii-frame-container">
                <iframe id="hanzii-iframe" src="about:blank"></iframe>
            </div>
        </div>

        <div id="status" style="font-size: 9px; color: #adb5bd; margin-bottom: 3px;">Syncing...</div>
        
        <div class="tab-menu">
            <button id="tab-new" class="active" onclick="changeTab('new')">MỚI</button>
            <button id="tab-learning" onclick="changeTab('learning')">ĐANG HỌC</button>
            <button id="tab-mastered" onclick="changeTab('mastered')">ĐÃ THUỘC</button>
            <button id="tab-review" onclick="changeTab('review')" style="background: #fee; color: var(--primary);">🚀 BLAST GAME</button>
        </div>

        <div class="stats-container" id="stats-box">
            <button class="btn-reset" onclick="resetProgress()">🔄</button>
            <div style="display: flex; justify-content: space-around; font-size: 13px;">
                <div style="text-align:center"><span id="stat-new-count" style="font-weight:bold">0</span><br><small>Mới</small></div>
                <div style="text-align:center; color:var(--orange)"><span id="stat-learning-count" style="font-weight:bold">0</span><br><small>Học</small></div>
                <div style="text-align:center; color:var(--success)"><span id="stat-mastered-count" style="font-weight:bold">0</span><br><small>Thuộc</small></div>
            </div>
            <div class="progress-wrapper">
                <div id="pb-mastered" class="progress-bar pb-mastered"></div>
                <div id="pb-learning" class="progress-bar pb-learning"></div>
                <div id="pb-new" class="progress-bar pb-new"></div>
            </div>
        </div>

        <div id="standard-area">
            <div class="container">
                <div id="card" class="flashcard">
                    <div class="card-face">
                        <div id="mastery-count" style="font-size: 12px; margin-bottom: 2px;"></div>
                        <div id="hanzi-wrapper"></div>
                        <div class="grid-container">
                            <div class="grid-line-v"></div><div class="grid-line-h"></div>
                            <div id="stroke-target"></div>
                        </div>
                        <div id="quiz-msg" style="height:35px; font-size:12px; font-weight:bold; text-align:center; margin: 5px 0;"></div>
                        <button class="action" style="background:var(--secondary); width: auto; padding: 8px 20px; border-radius: 10px;" onclick="flipCard()">ĐÁP ÁN</button>
                    </div>
                    <div class="card-face card-back">
                        <div id="back-hanzi" style="font-size:75px; color:var(--primary); font-family:var(--kaiti-font)"></div>
                        <p id="back-pinyin" style="font-size:24px; color:var(--secondary); margin:5px 0"></p>
                        <p id="back-meaning" style="font-size:20px; font-weight:bold; text-align: center;"></p>
			<p id="back-example" style="font-size:16px; color:#555; font-style:italic; margin-top:10px; border-top:1px solid #ddd; padding-top:5px; text-align:center; width:90%; display:none;"></p>
                        <button class="btn-lookup" onclick="openHanzii(event)">Tra cứu từ điển 🔍</button>
                        <button class="action" style="background:var(--gray); flex:none; padding:8px 25px; margin-top:15px; border-radius: 10px;" onclick="flipCard()">Quay lại</button>
                    </div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="action" style="background:var(--secondary)" onclick="changeCard(-1)">⬅️</button>
                <button class="action" style="background:var(--orange)" onclick="shuffleWords()">🔀</button>
                <button class="action" style="background:var(--secondary)" onclick="changeCard(1)">➡️</button>
            </div>
            
            <div id="main-controls" class="btn-group" style="margin-bottom: 10px;">
                <button class="action" style="background:var(--secondary); flex:0.3" onclick="speak()">🔊</button>
                <button id="mic-btn" class="action" style="background:#606c38; flex:0.3" onclick="startSpeechRecognition()">🎤</button>
                <button class="action" style="background:var(--primary)" onclick="handleMark(false)">QUÊN</button>
                <button class="action" style="background:var(--success)" onclick="handleMark(true)">THUỘC</button>
            </div>
        </div>

        <div id="game-area">
            <div id="game-ui" style="position: absolute; top: 15px; width:100%; padding:0 20px; display:flex; justify-content:space-between; color:white; font-size:13px; z-index:10;">
                <div id="game-score">Điểm: 0</div>
                <div id="game-hearts">❤️❤️❤️</div>
            </div>
            <div class="speed-control">
                <button id="blind-mode-btn" onclick="toggleBlindMode()" title="Chế độ ẩn">👁️</button>
                <div style="width:1px; height:15px; background:rgba(255,255,255,0.2); margin:0 5px;"></div>
                <button class="speed-btn" id="s1" onclick="setSpeed(1)">x1</button>
                <button class="speed-btn" id="s2" onclick="setSpeed(2)">x2</button>
                <button class="speed-btn active" id="s3" onclick="setSpeed(3)">x3</button>
            </div>
            <div id="game-current-hanzi">?</div>
            <div id="target-container"></div>
            <button id="game-start-btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0eAYG6Skvnm5d_qnBe7dYpDJ3oq-rb5zjgfcM-mNrIMDCoGPIl4l66y4re8AJS56I/exec';
        let originalWords = [], displayList = [], currentIndex = 0, currentTab = 'new';
        let currentSheetName = "Default", allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
        let gameScore = 0, gameHearts = 3, gameActive = false, currentCorrectWord = null;
        let targets = [], spawnTimer = null, moveInterval = null, speedMultiplier = 1.9;
        let writerInstance = null;
        let isBlindMode = false;

       // Thay thế hàm init cũ
async function init() {
    // 1. Khôi phục tên Sheet từ bộ nhớ ngay lập tức
    const savedSheetName = localStorage.getItem('hsk_current_sheet_name');
    if (savedSheetName) {
        currentSheetName = savedSheetName;
        document.getElementById('status').innerText = "Offline: " + currentSheetName;
    }

    // 2. Tải dữ liệu từ vựng đã lưu
    const cached = localStorage.getItem('hsk_cached_words');
    if (cached) { 
        try {
            originalWords = JSON.parse(cached); 
            // Cập nhật lại biến allProgress từ localStorage trước khi render
            allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
            render(); 
        } catch(e) { console.log("Cache lỗi"); }
    }

    try {
        const res = await fetch(SCRIPT_URL);
        const result = await res.json();
        if (result && result.words) {
            originalWords = result.words; 
            currentSheetName = result.sheetName || "Default";
            
            // Lưu tên sheet để dùng cho lần sau (offline)
            localStorage.setItem('hsk_current_sheet_name', currentSheetName);
            
            document.getElementById('status').innerText = currentSheetName;
            localStorage.setItem('hsk_cached_words', JSON.stringify(originalWords));
            
            // Cập nhật lại tiến độ mới nhất trước khi vẽ giao diện
            allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
            render();
        }
    } catch (e) { 
        console.error("Lỗi fetch:", e);
        document.getElementById('status').innerText = "Offline: " + currentSheetName;
        // Đảm bảo khi lỗi mạng, vẫn phải có allProgress để render
        allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
        render();
    }
}

// Thêm một dòng này vào ĐẦU hàm render() của bạn để chắc chắn dữ liệu luôn mới
function render() {
    // Ép buộc cập nhật lại allProgress từ kho lưu trữ mỗi khi render
    allProgress = JSON.parse(localStorage.getItem('hsk_multi_sheet_db') || "{}");
    
    const db = allProgress[currentSheetName] || {};
    if (currentTab === 'new') displayList = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0);
    else if (currentTab === 'learning') displayList = originalWords.filter(w => db[w.hanzi]?.count > 0 && db[w.hanzi]?.count < 3);
    else if (currentTab === 'mastered') displayList = originalWords.filter(w => db[w.hanzi]?.count >= 3);
    
    currentIndex = 0; 
    updateStats(); 
    updateUI();
}

        function changeTab(t) {
            currentTab = t; stopGame();
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            if (t === 'review') {
                document.getElementById('standard-area').style.display = 'none';
                document.getElementById('stats-box').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
            } else {
                document.getElementById('standard-area').style.display = 'flex';
                document.getElementById('stats-box').style.display = 'block';
                document.getElementById('game-area').style.display = 'none';
                render();
            }
        }

        function render() {
            const db = allProgress[currentSheetName] || {};
            if (currentTab === 'new') displayList = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0);
            else if (currentTab === 'learning') displayList = originalWords.filter(w => db[w.hanzi]?.count > 0 && db[w.hanzi]?.count < 3);
            else if (currentTab === 'mastered') displayList = originalWords.filter(w => db[w.hanzi]?.count >= 3);
            currentIndex = 0; updateStats(); updateUI();
        }

        function updateStats() {
            const db = allProgress[currentSheetName] || {};
            const n = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0).length;
            const l = originalWords.filter(w => db[w.hanzi]?.count > 0 && db[w.hanzi]?.count < 3).length;
            const m = originalWords.filter(w => db[w.hanzi]?.count >= 3).length;
            document.getElementById('stat-new-count').innerText = n;
            document.getElementById('stat-learning-count').innerText = l;
            document.getElementById('stat-mastered-count').innerText = m;
            const total = originalWords.length || 1;
            document.getElementById('pb-new').style.width = (n/total*100) + "%";
            document.getElementById('pb-learning').style.width = (l/total*100) + "%";
            document.getElementById('pb-mastered').style.width = (m/total*100) + "%";
        }

        function updateUI() {
            const w = displayList[currentIndex];
            const wrap = document.getElementById('hanzi-wrapper');
            const targetDiv = document.getElementById('stroke-target');
            const msg = document.getElementById('quiz-msg');
            msg.innerText = ""; wrap.innerHTML = ""; targetDiv.innerHTML = "";
            document.getElementById('card').classList.remove('flipped');
            if (!w) { wrap.innerHTML = "Trống"; return; }
            const db = allProgress[currentSheetName] || {};
            const count = db[w.hanzi]?.count || 0;
            document.getElementById('mastery-count').innerText = count > 0 ? "⭐".repeat(count) : "🆕";

            if (currentTab === 'mastered') {
                wrap.innerHTML = `<div style="text-align:center"><small>Viết chữ:</small><br><b>${w.meaning}</b></div>`;
                startQuizMode(w.hanzi, 0);
            } else {
                w.hanzi.split("").forEach((c, i) => {
                    const s = document.createElement("span"); s.innerText = c;
                    s.className = "hanzi-char " + (i === 0 ? "active" : "");
                    s.onclick = () => {
                        document.querySelectorAll('.hanzi-char').forEach(e => e.classList.remove('active'));
                        s.classList.add('active'); drawChar(c);
                    };
                    wrap.appendChild(s);
                });
                drawChar(w.hanzi[0]);
            }
            document.getElementById('back-hanzi').innerText = w.hanzi;
            document.getElementById('back-pinyin').innerText = w.pinyin;
            document.getElementById('back-meaning').innerText = w.meaning;
		const exampleEl = document.getElementById('back-example');
            if (exampleEl) {
                if (w && w.example) {
                    exampleEl.innerText = w.example;
                    exampleEl.style.display = "block";
                } else {
                    exampleEl.innerText = "";
                    exampleEl.style.display = "none";
                }
            }
        }

        function drawChar(c) {
            document.getElementById('stroke-target').innerHTML = "";
            writerInstance = HanziWriter.create('stroke-target', c, { width: 190, height: 190, padding: 15, strokeColor: '#e63946', showOutline: true, showCharacter: false });
            writerInstance.animateCharacter();
        }

        function startQuizMode(fullHanzi, charIndex) {
            const charToDraw = fullHanzi[charIndex];
            document.getElementById('stroke-target').innerHTML = "";
            writerInstance = HanziWriter.create('stroke-target', charToDraw, { width: 190, height: 190, padding: 15, showOutline: false, showCharacter: false, strokeColor: '#e63946', drawingColor: '#2a9d8f' });
            writerInstance.quiz({
                onComplete: () => { 
                    if (charIndex < fullHanzi.length - 1) setTimeout(() => startQuizMode(fullHanzi, charIndex + 1), 500);
                    else { document.getElementById('quiz-msg').innerText = "✅ Chính xác!"; speak(); }
                }
            });
        }

        function setSpeed(v) {
            speedMultiplier = v === 1 ? 0.6 : v === 2 ? 1.1 : 1.9;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('s' + v).classList.add('active');
        }

        function toggleBlindMode() {
            isBlindMode = !isBlindMode;
            const btn = document.getElementById('blind-mode-btn');
            btn.classList.toggle('active');
            btn.innerText = isBlindMode ? "🙈" : "👁️";
            if (gameActive) updateGameDisplay();
        }

        function updateGameDisplay() {
            const displayEl = document.getElementById('game-current-hanzi');
            if (isBlindMode) displayEl.innerText = "???";
            else displayEl.innerText = currentCorrectWord ? currentCorrectWord.hanzi : "?";
        }

        function startGame() {
            const db = allProgress[currentSheetName] || {};
            const gamePool = originalWords.filter(w => db[w.hanzi]?.count > 0);
            if (gamePool.length < 2) return alert("Bạn cần có ít nhất 2 từ trong danh sách 'Đang học' hoặc 'Đã thuộc' để chơi!");
            document.getElementById('game-start-btn').style.display = 'none';
            gameScore = 0; gameHearts = 3; gameActive = true;
            updateGameUI(); spawnNewWord(gamePool);
            moveInterval = setInterval(updateTargets, 20);
            spawnTimer = setInterval(() => spawnTarget(gamePool), 2400); 
        }

        function spawnNewWord(pool) {
            const db = allProgress[currentSheetName] || {};
            let weightedPool = [];
            pool.forEach(word => {
                const count = db[word.hanzi]?.count || 0;
                const weight = Math.max(1, 6 - count); 
                for(let i=0; i < weight; i++) weightedPool.push(word);
            });
            targets.forEach(t => t.isLegacy = true);
            currentCorrectWord = weightedPool[Math.floor(Math.random() * weightedPool.length)];
            updateGameDisplay();
            speakGame(currentCorrectWord.hanzi);
            spawnTarget(pool, currentCorrectWord.meaning, true);
        }

        function spawnTarget(pool, txt = null, isCorrect = false) {
            if (!gameActive) return;
            const container = document.getElementById('target-container');
            const node = document.createElement('div');
            let word = isCorrect ? currentCorrectWord : pool[Math.floor(Math.random() * pool.length)];
            node.innerText = txt || word.meaning;
            node.style.cssText = `position:absolute; padding:10px 18px; background:white; border-radius:25px; font-weight:bold; font-size:13px; top:550px; left:${Math.random()*250}px; box-shadow:0 4px 10px rgba(0,0,0,0.2); cursor:pointer; z-index:100;`;
            node.onclick = () => {
                if (word.hanzi === currentCorrectWord.hanzi) { 
                    gameScore += 10; node.remove(); spawnNewWord(pool); updateGameUI(); 
                } else { 
                    gameHearts--; updateGameUI(); 
                    if(gameHearts <= 0) { stopGame(); alert("Game Over!"); } 
                    node.style.background="red"; 
                }
            };
            container.appendChild(node);
            targets.push({ el: node, y: 550, speed: (1.5 + (gameScore/500)) * speedMultiplier, hanzi: word.hanzi, isLegacy: false });
        }

        function updateTargets() {
            targets.forEach((t, i) => {
                t.y -= t.speed; t.el.style.top = t.y + 'px';
                if (t.y < -50) { 
                    if (t.hanzi === currentCorrectWord.hanzi) {
                         if (!t.isLegacy || (t.isLegacy && t.y > 180)) {
                             gameHearts--; updateGameUI(); if(gameHearts <= 0) stopGame();
                         }
                    }
                    t.el.remove(); targets.splice(i, 1); 
                }
            });
        }

        function stopGame() {
            gameActive = false; clearInterval(moveInterval); clearInterval(spawnTimer);
            document.getElementById('game-start-btn').style.display = 'block';
            document.getElementById('target-container').innerHTML = '';
            targets = [];
        }

        function updateGameUI() {
            document.getElementById('game-score').innerText = `Điểm: ${gameScore}`;
            document.getElementById('game-hearts').innerText = "❤️".repeat(gameHearts) + "🖤".repeat(3 - gameHearts);
        }

        function handleMark(ok) {
            const w = displayList[currentIndex]; if(!w) return;
            if (!allProgress[currentSheetName]) allProgress[currentSheetName] = {};
            const db = allProgress[currentSheetName];
            if (!db[w.hanzi]) db[w.hanzi] = { count: 0 };
            db[w.hanzi].count = ok ? Math.min(db[w.hanzi].count + 1, 5) : Math.max(0, db[w.hanzi].count - 1);
            localStorage.setItem('hsk_multi_sheet_db', JSON.stringify(allProgress));
            render();
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); if(document.getElementById('card').classList.contains('flipped')) speak(); }
        function changeCard(n) { currentIndex = (currentIndex + n + displayList.length) % displayList.length; updateUI(); }
        function speak() { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(displayList[currentIndex].hanzi); m.lang = 'zh-CN'; window.speechSynthesis.speak(m); }
        function speakGame(h) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(h); m.lang = 'zh-CN'; window.speechSynthesis.speak(m); }
        function shuffleWords() { displayList.sort(() => Math.random() - 0.5); currentIndex = 0; updateUI(); }
        function resetProgress() { if(confirm("Xóa tiến độ?")) { delete allProgress[currentSheetName]; localStorage.setItem('hsk_multi_sheet_db', JSON.stringify(allProgress)); render(); } }
        
        function startSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) return alert("Trình duyệt không hỗ trợ.");
            const rec = new webkitSpeechRecognition();
            rec.lang = 'zh-CN'; rec.interimResults = false;
            const btn = document.getElementById('mic-btn');
            const msg = document.getElementById('quiz-msg');
            const target = displayList[currentIndex]?.hanzi;
            if (!target) return;
            rec.onstart = () => { btn.classList.add('listening'); msg.innerText = "Đang nghe..."; };
            rec.onresult = (e) => {
                const result = e.results[0][0].transcript;
                if (result === target) msg.innerHTML = `<span style="color:var(--success)">✅ Khớp: ${result}</span>`;
                else msg.innerHTML = `<span style="color:var(--primary)">❌ Nghe thành: "${result}"</span>`;
            };
            rec.onend = () => btn.classList.remove('listening');
            rec.start();
        }

        /* --- LOGIC TRA CỨU FIX TRIỆT ĐỂ --- */
        function openHanzii(e) {
            if(e) e.stopPropagation(); // Ngăn sự kiện chạm lan ra làm lật thẻ
            const word = displayList[currentIndex].hanzi;
            if (word) {
                const iframe = document.getElementById('hanzii-iframe');
                iframe.src = "https://hanzii.net/search/word/" + encodeURIComponent(word) + "?hl=vi-VN";
                document.getElementById('hanzii-modal').style.display = "flex";
            }
        }

        function closeHanzii() {
            document.getElementById('hanzii-modal').style.display = "none";
            document.getElementById('hanzii-iframe').src = "about:blank";
        }

        window.onload = init;
	// --- PHẦN CẬP NHẬT NGOẠI TUYẾN ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => {
                console.log('SW đã đăng ký thành công cho:', reg.scope);
                // Tự động kiểm tra cập nhật mỗi khi load trang
                reg.update();
            })
            .catch(err => console.log('SW đăng ký thất bại:', err));
    });
}
    </script>
