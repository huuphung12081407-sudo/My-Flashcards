<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Flashcards Kaiti</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

    <style>
        :root { 
            --primary: #e63946; --secondary: #457b9d; --bg: #f8f9fa; 
            --success: #2a9d8f; --dark: #1d3557; --orange: #f4a261;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; padding: 10px; margin: 0; min-height: 100vh;
        }

        /* Tabs Menu */
        .tab-menu { 
            display: flex; width: 100%; max-width: 400px; 
            background: #eee; border-radius: 12px; 
            margin-bottom: 10px; padding: 4px; 
        }
        .tab-menu button { 
            flex: 1; border: none; padding: 10px 2px; 
            border-radius: 8px; cursor: pointer; 
            background: transparent; font-weight: bold; 
            color: #777; transition: 0.2s; font-size: 11px;
        }
        .tab-menu button.active { background: white; color: var(--dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #stats-text { font-size: 13px; color: #999; margin-bottom: 8px; font-weight: bold; }

        .container { width: 100%; max-width: 400px; perspective: 1000px; }
        .flashcard { width: 100%; height: 480px; position: relative; transform-style: preserve-3d; transition: transform 0.4s; }
        .flashcard.flipped { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; border-radius: 20px; 
            background: white; box-shadow: 0 8px 15px rgba(0,0,0,0.08); 
            padding: 15px; text-align: center; box-sizing: border-box; 
        }
        .card-back { transform: rotateY(180deg); border-top: 5px solid var(--secondary); }

        /* ÉP FONT KHẢI THƯ CHUẨN NHƯ HÌNH GỬI */
        .hanzi-wrapper { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .hanzi-char { 
            /* Font Ma Shan Zheng và Long Cang có nét móc nhọn y hệt hình vẽ tay */
            font-family: 'Ma Shan Zheng', 'Long Cang', cursive !important; 
            font-size: 100px; 
            color: var(--primary); 
            cursor: pointer; 
            line-height: 1.1;
            /* Khử răng cưa cho nét mỏng */
            -webkit-font-smoothing: antialiased;
        }
        .hanzi-char.active { color: var(--orange); text-decoration: underline; }

        #stroke-target { 
            width: 180px; height: 180px; border: 1px dashed #ddd; 
            border-radius: 12px; margin-top: 10px; background: #fff; 
        }

        .pinyin { font-size: 26px; color: #666; margin: 10px 0; font-family: serif; }
        .meaning { font-size: 22px; font-weight: bold; color: var(--dark); padding: 0 10px; }

        /* Buttons */
        .btn-group { display: flex; gap: 8px; margin-top: 12px; width: 100%; max-width: 400px; }
        button.action { 
            flex: 1; padding: 14px; border-radius: 12px; border: none; 
            color: white; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.2s; box-shadow: 0 3px 0px rgba(0,0,0,0.15);
        }
        button.action:active { transform: translateY(2px); box-shadow: none; }
        .btn-blue { background: var(--secondary); }
        .btn-red { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--orange); }

        #status { font-size: 10px; color: #bbb; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="status">Đang kết nối dữ liệu...</div>
    
    <div class="tab-menu">
        <button id="tab-new" class="active" onclick="changeTab('new')">🆕 Mới</button>
        <button id="tab-learning" onclick="changeTab('learning')">⏳ Đang học</button>
        <button id="tab-mastered" onclick="changeTab('mastered')">🏆 Đã thuộc</button>
    </div>

    <div id="stats-text">0 / 0</div>

    <div class="container">
        <div id="card" class="flashcard">
            <div class="card-face">
                <div id="hanzi-wrapper" class="hanzi-wrapper"></div>
                <div id="stroke-target"></div>
                <button class="action btn-blue" style="margin-top: 15px; font-size: 13px; padding: 8px;" onclick="flipCard()">Xem nghĩa & Pinyin</button>
            </div>
            <div class="card-face card-back" onclick="flipCard()">
                <p class="pinyin" id="back-pinyin">...</p>
                <p class="meaning" id="back-meaning">...</p>
                <small style="color:#ddd; margin-top: 20px;">(Chạm để quay lại mặt trước)</small>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="action btn-blue" onclick="changeCard(-1)">⬅️</button>
        <button class="action btn-orange" onclick="shuffleWords()">🔀 Trộn</button>
        <button class="action btn-blue" onclick="changeCard(1)">➡️</button>
    </div>

    <div class="btn-group">
        <button class="action btn-blue" style="flex: 0.4;" onclick="speak()">🔊 Đọc</button>
        <button class="action btn-red" onclick="handleMark(false)">❌ Quên</button>
        <button class="action btn-green" onclick="handleMark(true)">✅ Thuộc</button>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6GBYQFrAk-jixOHQz3MyoWWpyT6cB3fCBTb29iaTX4kl1YMbj5VI6M96FTNi64yEI/exec';
        let originalWords = [], displayList = [], currentIndex = 0, currentTab = 'new', writer = null;
        let db = JSON.parse(localStorage.getItem('hsk_data_v4') || "{}");

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error();
                originalWords = await response.json();
                document.getElementById('status').innerText = "Dữ liệu: Đã đồng bộ";
                render();
            } catch (e) { 
                document.getElementById('status').innerText = "Lỗi tải dữ liệu. Đang thử lại...";
                setTimeout(loadData, 3000);
            }
        }

        function changeTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            render();
        }

        function render() {
            if (currentTab === 'new') displayList = originalWords.filter(w => !db[w.hanzi] || db[w.hanzi].count === 0);
            else if (currentTab === 'learning') displayList = originalWords.filter(w => db[w.hanzi] && db[w.hanzi].count >= 1 && db[w.hanzi].count <= 2);
            else if (currentTab === 'mastered') displayList = originalWords.filter(w => db[w.hanzi] && db[w.hanzi].count >= 3);
            
            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            const wrapper = document.getElementById('hanzi-wrapper');
            const stats = document.getElementById('stats-text');
            wrapper.innerHTML = ""; 

            if (displayList.length === 0) {
                wrapper.innerHTML = "<div style='color:#ccc; font-size: 16px;'>Danh sách này đang trống</div>";
                stats.innerText = "0 / 0";
                document.getElementById('stroke-target').innerHTML = "";
                return;
            }

            const w = displayList[currentIndex];
            stats.innerText = `Thẻ ${currentIndex + 1} / ${displayList.length}`;

            const chars = w.hanzi.trim().split("");
            chars.forEach((char, index) => {
                const span = document.createElement("span");
                span.innerText = char;
                span.className = "hanzi-char";
                if(index === 0) span.classList.add('active'); 
                span.onclick = (e) => {
                    e.stopPropagation(); 
                    document.querySelectorAll('.hanzi-char').forEach(c => c.classList.remove('active'));
                    span.classList.add('active');
                    drawChar(char);
                };
                wrapper.appendChild(span);
            });

            document.getElementById('back-pinyin').innerText = w.pinyin;
            document.getElementById('back-meaning').innerText = w.meaning;
            drawChar(chars[0]);
        }

        function drawChar(char) {
            document.getElementById('stroke-target').innerHTML = ""; 
            writer = HanziWriter.create('stroke-target', char, {
                width: 170, height: 170, padding: 5,
                strokeAnimationSpeed: 1.5, delayBetweenStrokes: 200, strokeColor: '#e63946',
                outlineColor: '#eee'
            });
            writer.animateCharacter();
            document.getElementById('stroke-target').onclick = (e) => { e.stopPropagation(); writer.animateCharacter(); };
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); if(document.getElementById('card').classList.contains('flipped')) speak(); }
        function changeCard(n) { if (displayList.length === 0) return; currentIndex = (currentIndex + n + displayList.length) % displayList.length; updateUI(); }
        
        function handleMark(isCorrect) {
            if (displayList.length === 0) return;
            const word = displayList[currentIndex].hanzi;
            if (!db[word]) db[word] = { count: 0 };
            
            if (isCorrect) db[word].count = Math.min(db[word].count + 1, 3);
            else db[word].count = (db[word].count >= 3) ? 1 : 0;
            
            localStorage.setItem('hsk_data_v4', JSON.stringify(db));
            setTimeout(render, 200);
        }

        function speak() { 
            if (displayList.length === 0) return; 
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(displayList[currentIndex].hanzi); 
            msg.lang = 'zh-CN'; 
            window.speechSynthesis.speak(msg); 
        }

        function shuffleWords() {
            if (displayList.length <= 1) return;
            for (let i = displayList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [displayList[i], displayList[j]] = [displayList[j], displayList[i]];
            }
            currentIndex = 0;
            updateUI();
        }

        window.onload = loadData;
    </script>
</body>
</html>
